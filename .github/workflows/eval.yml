name: Health Eval

on:
  push:
  pull_request:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret and private data tripwire
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run secret scan
        run: |
          python scripts/secret_scan.py
          python scripts/secret_scan.py --all-files
          python -m pytest tests/test_secret_scan.py tests/test_release_safety.py

  trufflehog:
    name: TruffleHog verified secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  release-safety:
    name: Release artifact and snapshot safety
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip build
          python -m pip install --ignore-requires-python -e ".[dev]"

      - name: Run full tests and release safety checks
        run: |
          python -m pytest
          python -m compileall -q .
          python scripts/release_safety.py

  lane-1:
    name: Lane 1 deterministic pytest
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 1
        run: |
          python -m pytest health_eval
          python -m health_eval.run --smoke

  lane-2:
    name: Lane 2 judge determinism smoke
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 2
        run: make PYTHON=python health-eval-judge

  lane-3:
    name: Lane 3 agent eval smoke
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 3
        run: make PYTHON=python health-eval-full
