name: Health Eval

on:
  push:
  pull_request:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret and private data tripwire
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret scan
        run: python scripts/secret_scan.py

  lane-1:
    name: Lane 1 deterministic pytest
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 1
        run: |
          python -m pytest health_eval
          python -m health_eval.run --smoke

  lane-2:
    name: Lane 2 judge determinism smoke
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 2
        run: make PYTHON=python health-eval-judge

  lane-3:
    name: Lane 3 agent eval smoke
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest pytest-timeout

      - name: Run Lane 3
        run: make PYTHON=python health-eval-full
